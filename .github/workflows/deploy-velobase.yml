name: Deploy to Velobase Cloud (Web + Worker)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: velobase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (required for web image)
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Create empty .env for Docker builds
        run: touch .env

      - name: Build per-service images
        run: |
          SHA=${{ github.sha }}

          docker build -f Dockerfile.web    -t "velobase-web:$SHA" .
          docker build -f Dockerfile.worker -t "velobase-worker:$SHA" .

      - name: Get Velobase deploy config and login to Velobase ACR
        id: config
        run: |
          CONFIG=$(curl --fail-with-body -sS https://api.velobase.cloud/api/v1/deploy/config \
            -H "X-API-Key: ${{ secrets.VELOBASE_API_KEY }}")

          DATA_PLANE_MODE=$(jq -r '.dataPlaneMode // "unknown"' <<< "$CONFIG")
          APP_BUDGET_CPU=$(jq -r '.appBudget.cpu // "970m"' <<< "$CONFIG")
          APP_BUDGET_MEMORY=$(jq -r '.appBudget.memory // "2355Mi"' <<< "$CONFIG")

          SERVICE_CPU_REQUEST="485m"
          SERVICE_MEMORY_REQUEST="1177Mi"
          SERVICE_CPU_LIMIT="$SERVICE_CPU_REQUEST"
          SERVICE_MEMORY_LIMIT="$SERVICE_MEMORY_REQUEST"

          if [[ "$APP_BUDGET_CPU" =~ ^([0-9]+)m$ ]]; then
            SERVICE_CPU_REQUEST="$((BASH_REMATCH[1] / 2))m"
            SERVICE_CPU_LIMIT="$SERVICE_CPU_REQUEST"
          fi

          if [[ "$APP_BUDGET_MEMORY" =~ ^([0-9]+)Mi$ ]]; then
            SERVICE_MEMORY_REQUEST="$((BASH_REMATCH[1] / 2))Mi"
            SERVICE_MEMORY_LIMIT="$SERVICE_MEMORY_REQUEST"
          fi

          echo "Velobase dataPlaneMode=$DATA_PLANE_MODE"
          echo "Velobase appBudget=${APP_BUDGET_CPU} CPU / ${APP_BUDGET_MEMORY} memory"
          echo "Per-service requests: $SERVICE_CPU_REQUEST CPU / $SERVICE_MEMORY_REQUEST memory"
          echo "Per-service limits: $SERVICE_CPU_LIMIT CPU / $SERVICE_MEMORY_LIMIT memory"

          if [ "$DATA_PLANE_MODE" != "project" ]; then
            echo "::error title=Unsupported Velobase Cloud project::This workflow uses the Deploy API, which requires a project data-plane project. Current dataPlaneMode is '$DATA_PLANE_MODE'. Reinitialize or migrate the project in Velobase Cloud, update VELOBASE_API_KEY, then rerun this workflow."
            exit 1
          fi

          PASSWORD=$(jq -r .password <<< "$CONFIG")
          REGISTRY=$(jq -r .registry <<< "$CONFIG")
          USERNAME=$(jq -r .username <<< "$CONFIG")

          echo "::add-mask::$PASSWORD"
          echo "$PASSWORD" | docker login "$REGISTRY" \
            -u "$USERNAME" \
            --password-stdin

          {
            echo "registry=$REGISTRY"
            echo "repository=$(jq -r .repository <<< "$CONFIG")"
            echo "username=$USERNAME"
            echo "data_plane_mode=$DATA_PLANE_MODE"
            echo "app_budget_cpu=$APP_BUDGET_CPU"
            echo "app_budget_memory=$APP_BUDGET_MEMORY"
            echo "service_cpu_request=$SERVICE_CPU_REQUEST"
            echo "service_memory_request=$SERVICE_MEMORY_REQUEST"
            echo "service_cpu_limit=$SERVICE_CPU_LIMIT"
            echo "service_memory_limit=$SERVICE_MEMORY_LIMIT"
          } >> "$GITHUB_OUTPUT"

      - name: Push per-service images
        run: |
          REPO=${{ steps.config.outputs.repository }}
          SHA=${{ github.sha }}

          docker tag "velobase-web:$SHA" "$REPO:web-$SHA"
          docker tag "velobase-worker:$SHA" "$REPO:worker-$SHA"

          docker push "$REPO:web-$SHA"
          docker push "$REPO:worker-$SHA"

      - name: Deploy (web + worker)
        run: |
          SHA=${{ github.sha }}
          COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s' | head -c 200)
          TRIGGER_REF=$(git rev-parse --abbrev-ref HEAD)

          jq -n \
            --arg sha "$SHA" \
            --arg webImage "web-$SHA" \
            --arg workerImage "worker-$SHA" \
            --arg commitMessage "$COMMIT_MESSAGE" \
            --arg triggerRef "$TRIGGER_REF" \
            --arg cpuRequest "${{ steps.config.outputs.service_cpu_request }}" \
            --arg memoryRequest "${{ steps.config.outputs.service_memory_request }}" \
            --arg cpuLimit "${{ steps.config.outputs.service_cpu_limit }}" \
            --arg memoryLimit "${{ steps.config.outputs.service_memory_limit }}" \
            '{
              image_tag: $sha,
              exposed_service: "web",
              services: [
                {
                  name: "web",
                  mode: "web",
                  port: 3000,
                  probe: "httpGet",
                  image_tag: $webImage,
                  cpu_request: $cpuRequest,
                  memory_request: $memoryRequest,
                  cpu_limit: $cpuLimit,
                  memory_limit: $memoryLimit
                },
                {
                  name: "worker",
                  mode: "worker",
                  port: 3001,
                  probe: "exec",
                  image_tag: $workerImage,
                  cpu_request: $cpuRequest,
                  memory_request: $memoryRequest,
                  cpu_limit: $cpuLimit,
                  memory_limit: $memoryLimit
                }
              ],
              commit_sha: $sha,
              commit_message: $commitMessage,
              trigger_ref: $triggerRef
            }' > deploy-payload.json

          curl --fail-with-body -X POST https://api.velobase.cloud/api/v1/deploy \
            -H "X-API-Key: ${{ secrets.VELOBASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data-binary @deploy-payload.json
